<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>مدارس رياض الإبداع | الاختبارات المحاكية لنافس</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, sans-serif; }
    body { background: linear-gradient(145deg, #eef2f7 0%, #dce3ec 100%); min-height: 100vh; padding: 20px 16px; transition: background 0.3s, color 0.3s; }
    body.dark-mode { background: #121212; color: #e0e0e0; }
    body.dark-mode .card { background: #1e1e2f; box-shadow: 0 20px 35px rgba(0,0,0,0.3); }
    body.dark-mode .header { background: #0a1a24; }
    body.dark-mode .student-badge { background: #2c4b5a; }
    body.dark-mode .test-card { background: #2a2a3a; border-color: #3a3a4a; }
    body.dark-mode .opt { background: #2a2a3a; border-color: #3a3a4a; color: #e0e0e0; }
    body.dark-mode .opt.selected { background: #1e4a3a; border-color: #2e7d64; }
    body.dark-mode .q-text { background: #2a2a3a; }
    body.dark-mode .report-card { background: #2a2a3a; }
    body.dark-mode .modal-box { background: #1e1e2f; color: #e0e0e0; }
    body.dark-mode .story-text { background: #2a2a3a; }
    body.dark-mode .timer-bar { background: linear-gradient(135deg, #1e3a4a, #0a2a3a); }
    body.dark-mode .review-item { background: #2a2a3a; }
    body.dark-mode .review-correct { background: #1a3a2a; }
    body.dark-mode .review-wrong { background: #3a2a2a; }
    .app-container { max-width: 950px; margin: 0 auto; }
    .card { background: white; border-radius: 48px; box-shadow: 0 20px 35px rgba(0,0,0,0.08); overflow: hidden; transition: background 0.3s; }
    .header { background: #0b2b40; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .logo-area { display: flex; align-items: center; gap: 10px; }
    .logo-img { height: 45px; width: auto; border-radius: 12px; background: white; padding: 2px 6px; }
    .logo-text { color: white; font-weight: 800; font-size: 1rem; }
    .student-badge { background: #1f4e5c; padding: 4px 12px; border-radius: 40px; color: white; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
    .student-badge:hover { background: #2e6b7c; }
    .dark-toggle { background: #3a6b7c; border: none; color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
    .dark-toggle:hover { background: #4e8c9e; transform: scale(1.05); }
    .info-button { background: #f7b32b; color: #1e2a1e; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: inline-flex; align-items: center; justify-content: center; margin-left: 8px; transition: all 0.2s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .info-button:hover { background: #ffc44d; transform: scale(1.05) rotate(2deg); }
    .main-content { padding: 20px; }
    /* نموذج التسجيل المحسن */
    .register-prompt {
      background: #f0f7ff;
      border-radius: 48px;
      padding: 30px 24px;
      text-align: center;
      margin: 20px 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    body.dark-mode .register-prompt { background: #2a2a3a; }
    .register-prompt h2 { color: #0b2b40; margin-bottom: 20px; font-size: 1.6rem; }
    body.dark-mode .register-prompt h2 { color: #ffd966; }
    .register-prompt .input-group { margin-bottom: 20px; text-align: right; }
    .register-prompt input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 60px;
      border: 2px solid #cbd5e1;
      font-size: 1rem;
      background: white;
    }
    body.dark-mode .register-prompt input { background: #1e1e2f; border-color: #4a4a5a; color: white; }
    .register-prompt button {
      background: #0b2b40;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .tests-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin: 20px 0; }
    .test-card { border-radius: 28px; padding: 8px 6px; text-align: center; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 2px 6px rgba(0,0,0,0.08); background: white; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .test-card.disabled { opacity: 0.7; filter: grayscale(0.1); cursor: not-allowed; pointer-events: none; background: #e9ecef; }
    .test-card.completed { border: 1px solid #2e7d64; }
    .test-card.math-1 { background: linear-gradient(135deg, #E8F0FE, #D9E6FF); border-right: 4px solid #1E88E5; }
    .test-card.math-2 { background: linear-gradient(135deg, #E0F7FA, #B2EBF2); border-right: 4px solid #00ACC1; }
    .test-card.math-3 { background: linear-gradient(135deg, #F3E5F5, #E1BEE7); border-right: 4px solid #8E24AA; }
    .test-card.reading-1 { background: linear-gradient(135deg, #FFF8E7, #FFE9BF); border-right: 4px solid #F9A825; }
    .test-card.reading-2 { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); border-right: 4px solid #43A047; }
    .test-card.reading-3 { background: linear-gradient(135deg, #FFEBEE, #FFCDD2); border-right: 4px solid #E53935; }
    .test-icon { font-size: 1.6rem; margin-bottom: 2px; }
    .test-title { font-weight: 700; font-size: 0.75rem; margin: 2px 0; }
    .subject-badge { display: inline-block; border-radius: 30px; padding: 2px 6px; font-size: 0.6rem; background: rgba(0,0,0,0.05); }
    .test-score { font-size: 0.65rem; font-weight: bold; color: #2e7d64; margin-top: 3px; }
    .lock-icon-large { font-size: 1.8rem; margin-bottom: 4px; display: block; }
    button { background: #0b2b40; border: none; padding: 8px 16px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { opacity: 0.9; transform: scale(1.02); }
    .reports-btn { background: #f7b32b; color: #1e2a1e; margin-top: 12px; width: 100%; font-size: 0.9rem; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-box { background: white; max-width: 800px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px; border-radius: 36px; box-shadow: 0 30px 40px rgba(0,0,0,0.3); }
    .story-text { background: #fef9e6; padding: 14px; border-radius: 24px; line-height: 1.6; font-size: 0.9rem; margin-bottom: 16px; text-align: justify; }
    .timer-bar { background: linear-gradient(135deg, #0b2b40, #1f4e5c); color: white; padding: 10px; border-radius: 50px; text-align: center; font-size: 1.4rem; font-weight: bold; margin-bottom: 16px; direction: ltr; }
    .q-text { font-size: 0.95rem; font-weight: 700; background: #f3f6fc; padding: 12px; border-radius: 24px; margin-bottom: 16px; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .opt { background: #f8fafc; padding: 8px 12px; border-radius: 50px; border: 1px solid #e2edf2; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
    .opt.selected { background: #e5f6e5; border-color: #2e7d64; }
    .opt-prefix { font-weight: 800; width: 24px; height: 24px; background: #dee4ec; border-radius: 40px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; }
    .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; gap: 12px; }
    .big-score { font-size: 2rem; font-weight: 800; color: #0b2b40; margin: 12px 0; }
    .chart-container { max-width: 100%; margin: 20px 0; height: 260px; position: relative; }
    .report-card { background: #f8fafd; border-radius: 24px; padding: 12px; margin-bottom: 16px; flex: 1; }
    .flex-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .whatsapp-icon { background: #25D366; display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 40px; color: white; text-decoration: none; font-size: 0.7rem; margin-top: 6px; }
    .footer { text-align: center; font-size: 0.7rem; padding: 16px; color: #5f7f8f; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 8px; }
    .review-list { display: flex; flex-direction: column; gap: 20px; margin: 20px 0; }
    .review-item { background: #f9fafc; border-radius: 24px; padding: 16px; border-right: 6px solid; }
    .review-correct { border-right-color: #2e7d64; background: #f0faf5; }
    .review-wrong { border-right-color: #d32f2f; background: #fff5f5; }
    .review-question { font-weight: 700; font-size: 0.9rem; margin-bottom: 12px; }
    .review-answer { font-size: 0.85rem; margin-top: 8px; padding: 8px; border-radius: 16px; }
    .review-student-answer { background: #e8f0fe; margin-bottom: 6px; }
    .review-correct-answer { background: #e6f4ea; }
    .fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 2px; }
    .fraction .num { border-bottom: 1px solid #000; padding: 0 4px; }
    .fraction .den { padding: 0 4px; }
    @media (max-width: 600px) {
      .modal-box { padding: 16px; }
      .test-card { padding: 6px 4px; }
      .register-prompt { padding: 20px 16px; }
    }
  </style>
</head>
<body>
<div class="app-container" id="appRoot">
  <div class="card">
    <div class="header">
      <div class="logo-area">
        <img class="logo-img" src="https://www.wzufa.com/wp-content/uploads/2022/07/Riyadh-Al-Ebdaa-Schools.png" alt="شعار مدارس رياض الإبداع" onerror="this.src='https://via.placeholder.com/60?text=RIYADH'">
        <div class="logo-text">مدارس رياض الإبداع</div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="info-button" id="infoButton">ℹ️</button>
        <button class="dark-toggle" id="darkModeToggle">🌙</button>
        <div class="student-badge" id="studentBadge">الطالب: غير مسجل</div>
      </div>
    </div>
    <div class="main-content" id="dynamicContent"></div>
    <div class="footer"> اختبارات نافس المحاكية / مدارس رياض الإبداع الأهلية 1447 هـ</div>
  </div>
</div>

<script>
  // التحقق من localStorage
  function isLocalStorageAvailable() {
    try { const testKey = '__storage_test__'; localStorage.setItem(testKey, 'test'); localStorage.removeItem(testKey); return true; } catch(e) { return false; }
  }
  if (!isLocalStorageAvailable()) {
    const warningDiv = document.createElement('div');
    warningDiv.style.position = 'fixed'; warningDiv.style.top = '10px'; warningDiv.style.left = '10px'; warningDiv.style.right = '10px';
    warningDiv.style.backgroundColor = '#ff9800'; warningDiv.style.color = '#000'; warningDiv.style.padding = '12px';
    warningDiv.style.borderRadius = '16px'; warningDiv.style.textAlign = 'center'; warningDiv.style.zIndex = '9999';
    warningDiv.style.fontWeight = 'bold';
    warningDiv.innerHTML = '⚠️ المتصفح في وضع التصفح الخاص – لن يتم حفظ التقدم. يرجى إعادة تحميل الصفحة في وضع التصفح العادي.';
    document.body.prepend(warningDiv);
  }

  // الوضع الليلي
  let darkMode = localStorage.getItem('darkMode') === 'true';
  function applyDarkMode() {
    if (darkMode) { document.body.classList.add('dark-mode'); document.getElementById('darkModeToggle').innerHTML = '☀️'; } 
    else { document.body.classList.remove('dark-mode'); document.getElementById('darkModeToggle').innerHTML = '🌙'; }
    localStorage.setItem('darkMode', darkMode);
  }
  applyDarkMode();
  document.getElementById('darkModeToggle').addEventListener('click', () => { darkMode = !darkMode; applyDarkMode(); });

  // معلومات المنصة
  document.getElementById('infoButton').addEventListener('click', () => {
    const modalDiv = document.createElement('div'); modalDiv.className = 'modal-overlay';
    modalDiv.innerHTML = `<div class="modal-box"><h3 style="text-align:center;">📌 منصة نافس التفاعلية</h3><div style="margin:16px 0;"><strong>🎯 محاكاة الاختبارات الوطنية "نافس"</strong><br>قياس المهارات في الرياضيات والقراءة.</div><ul><li>6 اختبارات شاملة</li><li>مؤقت 25 دقيقة</li><li>تقارير مفصلة ورسوم بيانية</li><li>مراجعة الأسئلة بعد الاختبار</li><li>إرسال النتائج لمعلم المادة عبر واتساب</li><li>تصميم أ/ أسامة إبراهيم / مدارس رياض الإبداع الأهلية 1447هـ</li></ul><button id="closeInfoBtn" class="secondary" style="display:block; margin:0 auto;">إغلاق</button></div>`;
    document.body.appendChild(modalDiv);
    document.getElementById('closeInfoBtn').onclick = () => modalDiv.remove();
  });

  // دوال مساعدة
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function toArabicIndic(num) { const digits = '٠١٢٣٤٥٦٧٨٩'; return num.toString().replace(/\d/g, d => digits[parseInt(d)]); }
  function convertNumbersToArabicIndic(text) { if (!text) return text; return text.replace(/\d+/g, match => toArabicIndic(match)); }
  function formatFractions(text) { return text.replace(/(\d+)\/(\d+)/g, (match, num, den) => `<span class="fraction"><span class="num">${toArabicIndic(num)}</span><span class="den">${toArabicIndic(den)}</span></span>`); }

  // ========== بنك الأسئلة (تم إصلاح الرياضيات لـ 45 سؤالاً) ==========
  const MATH_BASE = [
    { text: "ما اسم الشكل الهندسي الذي له 6 أوجه مربعة؟", options: ["مكعب", "مربع", "أسطوانة", "مستطيل"], correct: 0 },
    { text: "رسمت أمل مربعًا طول ضلعه 2 سم، ما مساحته؟", options: ["8 سم²", "4 سم²", "2 سم²", "12 سم²"], correct: 1 },
    { text: "حديقة مستطيلة طولها 9 م وعرضها 4 م، كم محيطها؟", options: ["36 م", "26 م", "12 م", "13 م"], correct: 1 },
    { text: "الصيغة اللفظية للعدد 3762:", options: ["ثلاث مئة وسبعة وستة وعشرون", "ثلاثة آلاف وسبع مئة واثنان وستون", "سبع وثلاثون ألْفًا", "ألفان وست مئة"], correct: 1 },
    { text: "رتب الأعداد تصاعدياً: 3695، 2557، 1963، 2569", options: ["1963، 2557، 2569، 3695", "3695، 2569، 2557، 1963", "2569، 1963، 3695", "1963، 2569، 2557"], correct: 0 },
    { text: "أي الكسور يمثل الجزء الملون (1 من 7)؟", options: ["1/7", "5/7", "1/2", "2/5"], correct: 0 },
    { text: "وزعت 5 سكاكر من 9 صديقات، الكسر الذي يمثل الموزعة:", options: ["5/9", "9/5", "4/9", "4/5"], correct: 0 },
    { text: "قارن 3/7 و 5/7:", options: ["3/7 > 5/7", "3/7 < 5/7", "جميع خاطئة", "3/7 = 5/7"], correct: 1 },
    { text: "مجموع 235 + 498 + 423 =", options: ["1156", "1000", "560", "260"], correct: 0 },
    { text: "556 - 215 =", options: ["341", "771", "200", "541"], correct: 0 },
    { text: "قسمت 9 قطع شوكولاتة على 3 أبناء ثم أكل أحمد قطعة، كم تبقى معه؟", options: ["1", "2", "3", "4"], correct: 1 },
    { text: "تقدير 235+368 لأقرب عشرة:", options: ["600", "610", "700", "603"], correct: 0 },
    { text: "خاصية الجمع مع الصفر: كتبت 18 كلمة ثم 18، كم زادت؟", options: ["1", "0", "3", "2"], correct: 1 },
    { text: "اشترى 7 قصص بسعر ريال واحد لكل قصة، كم دفع؟", options: ["6", "8", "7", "14"], correct: 2 },
    { text: "استخدم خاصية الإبدال: 4×3 و 3×4 كم الناتج؟", options: ["7", "12", "8", "16"], correct: 1 },
    { text: "ما محور تماثل المستطيل؟", options: ["محوران", "محور واحد", "ليس له", "ثلاثة"], correct: 0 },
    { text: "أي وحدات الزمن مناسبة لقراءة صفحة قرآن؟", options: ["الدقيقة", "الثانية", "الشهر", "الساعة"], correct: 0 },
    { text: "سعر ساعة 228 ريال، أي الأوراق النقدية تكفي؟", options: ["200+20+5+3", "100+100+20+5", "100+50+50+20+5", "كلها"], correct: 0 },
    { text: "إذا غادرت الساعة 3:20 وبقيت ساعة وربع، متى تخرج؟", options: ["3:35", "4:15", "4:35", "5:10"], correct: 2 },
    { text: "قيمة 0 × (8+2) =", options: ["8", "2", "10", "0"], correct: 3 },
    { text: "خاصية التجميع: 4×5×2 =", options: ["13", "14", "22", "40"], correct: 3 },
    { text: "أي جملة عددية تمثل (235-149)؟", options: ["384=149+235", "86=149-235", "86=235-149", "47=5÷235"], correct: 2 },
    { text: "محيط مربع طول ضلعه 5 سم:", options: ["20 سم", "25 سم", "10 سم", "15 سم"], correct: 0 },
    { text: "ناتج 72 ÷ 8 =", options: ["8", "9", "7", "10"], correct: 1 },
    { text: "أي الكسور أكبر: 2/3 أم 2/5؟", options: ["2/3", "2/5", "متساويان", "لا يمكن"], correct: 0 },
    { text: "إذا كان 3×□ = 21، فما قيمة □؟", options: ["6", "7", "8", "9"], correct: 1 },
    { text: "أي عمليات التحقق من 9×5=45؟", options: ["9=5÷45", "5=9÷45", "45÷5=9", "45-5=40"], correct: 2 },
    { text: "الشكل ثلاثي الأبعاد له 6 أوجه مستطيلة:", options: ["مكعب", "متوازي مستطيلات", "هرم", "أسطوانة"], correct: 1 }
  ];
  // توسيع البنك إلى 45 سؤالاً بالضبط
  function expandBank(bank, targetSize) {
    const expanded = [...bank];
    while (expanded.length < targetSize) expanded.push(...bank.slice(0, targetSize - expanded.length));
    return expanded.slice(0, targetSize);
  }
  const FULL_MATH = expandBank(MATH_BASE, 45);

  // نصوص القراءة
  const READING_TEXTS = {
    "قراءة - اختبار 1": `الحمامتان والسلحفاة\nيُحكى أنّ حمامتين جميلتين قرّرتا السفر والابتعاد عن الغدير الذي عاشتا إلى جانبه طويلاً بسبب شح الماء فيه، فحزنت صديقتهما السلحفاة وطلبت منهما أن تأخذاها معهما، فأجابتها الحمامتان بأنها لا تستطيع الطيران. بكت السلحفاة كثيراً وتوسلت إليهما بأن تجدا طريقة لنقلها معهما، فكرت الحمامتان كثيراً وقررتا حملها معهما، فأحضرتا عوداً قوياً أمسكت كل واحدة منهما به من طرف وطلبتا من السلحفاة أن تعض على هذا العود حتى تطيرا بها، وحذرتاها من أن تفتح فمها مهما كلّف الأمر؛ لأن ذلك سيؤدي إلى سقوطها. وافقت السلحفاة على ذلك ووعدتهما بأن تنفذ ما طلبتاه منها، وطارت الحمامتان فوق الغابة، إلى أن رأى بعض الناس الحمامتين والسلحفاة فقالوا: يا للعجب حمامتان تحملان سلحفاة وتطيران بها! لم تستطع السلحفاة تمالك نفسها فقالت: فقاً الله أعينكم ما دخلكم أنتم؟! فسقطت بعد أن أفلتت العود من فمها وتكسرت أضلعها وقالت باكية: هذه هي نتيجة كثرة الكلام وعدم الوفاء بالوعد.`,

  function buildTests(bank, subject, count, titlePrefix, storyMap) {
    const tests = [];
    for (let i = 0; i < count; i++) {
      const start = i * 15;
      const questions = bank.slice(start, start + 15).map(q => ({
        ...q,
        text: convertNumbersToArabicIndic(formatFractions(q.text)),
        options: q.options.map(opt => convertNumbersToArabicIndic(formatFractions(opt)))
      }));
      tests.push({
        id: `${subject}_test_${i+1}`,
        title: `${titlePrefix} - اختبار ${i+1}`,
        subject,
        questions,
        storyText: subject === 'reading' ? (storyMap ? storyMap[`${titlePrefix} - اختبار ${i+1}`] : null) : null
      });
    }
    return tests;
  }

  function getBestAttempt(testId) {
    const report = reports.find(r => r.testId === testId && r.studentName === student.name);
    return report ? { score: report.bestScore, total: report.bestTotal, time: report.bestTime } : null;
  }
  function updateBestAttempt(testId, score, total, timeTakenSeconds) {
    const existingIndex = reports.findIndex(r => r.testId === testId && r.studentName === student.name);
    const attempt = { score, total, time: timeTakenSeconds, date: new Date().toLocaleString('ar-SA') };
    const testTitle = allTests.find(t => t.id === testId).title;
    const subject = allTests.find(t => t.id === testId).subject;
    if (existingIndex === -1) {
      reports.push({ testId, studentName: student.name, testTitle, subject, bestScore: score, bestTotal: total, bestTime: timeTakenSeconds, attempts: [attempt] });
    } else {
      const rep = reports[existingIndex];
      rep.attempts.push(attempt);
      if (score > rep.bestScore) { rep.bestScore = score; rep.bestTotal = total; rep.bestTime = timeTakenSeconds; }
    }
    saveReports();

  function formatTime(sec) { const mins = Math.floor(sec/60); const remainSec = sec%60; return `${toArabicIndic(mins)}:${toArabicIndic(remainSec.toString().padStart(2,'0'))}`; }
  function updateTimerDisplay() { if(currentModalDiv) { const t = currentModalDiv.querySelector('#timerDisplay'); if(t) t.innerText = formatTime(timeLeftSeconds); } }

      if(timeLeftSeconds <= 0) { stopTimer(); if(testActive) finishTest(true); }
    }, 1000);

  function showFullReviewModal(questions, userAnswers, testTitle) {

      const statusClass = isCorrect ? 'review-correct' : 'review-wrong';

      reviewHtml += `<div class="review-item ${statusClass}"><div class="review-question"><span style="font-weight:800; margin-left:8px;">${toArabicIndic(i+1)}.</span> ${q.text}</div><div class="review-answer review-student-answer"><strong>✅ إجابتك:</strong> ${escapeHtml(userAns)} <span class="review-status">${statusIcon}</span></div><div class="review-answer review-correct-answer"><strong>📌 الإجابة الصحيحة:</strong> ${escapeHtml(correctAns)}</div></div>`;

    const q = currentTest.questions[currentQIndex];
    const selectedIdx = currentAnswers[currentQIndex];
    let optsHtml = '';
    q.options.forEach((opt, idx) => { optsHtml += `<div class="opt ${selectedIdx===idx ? 'selected' : ''}" data-optidx="${idx}"><div class="opt-prefix">${String.fromCharCode(65+idx)}</div><div>${opt}</div></div>`; });
    currentModalDiv.querySelector('.q-text').innerHTML = q.text;
    currentModalDiv.querySelector('.options').innerHTML = optsHtml;
    currentModalDiv.querySelector('.q-counter').innerHTML = `السؤال ${toArabicIndic(currentQIndex+1)} / ${toArabicIndic(currentTest.questions.length)}`;
    currentModalDiv.querySelectorAll('.opt').forEach(opt => {
      opt.addEventListener('click', () => {
        if(!testActive) return;
        const idx = parseInt(opt.dataset.optidx);
        if (currentAnswers[currentQIndex] !== idx) { currentAnswers[currentQIndex] = idx; updateCurrentQuestion(); }
      });
    });
  }
  function renderTestQuestion() {
    if(!testActive || !currentTest) return;
    if(currentModalDiv) { updateCurrentQuestion(); return; }
    const q = currentTest.questions[currentQIndex];
    let optsHtml = '';
    q.options.forEach((opt, idx) => { optsHtml += `<div class="opt" data-optidx="${idx}"><div class="opt-prefix">${String.fromCharCode(65+idx)}</div><div>${opt}</div></div>`; });
    const modalDiv = document.createElement('div'); modalDiv.className = 'modal-overlay';
    modalDiv.innerHTML = `<div class="modal-box"><div class="timer-bar">⏱️ الوقت المتبقي: <span id="timerDisplay">${formatTime(timeLeftSeconds)}</span></div><div style="display:flex; justify-content:space-between;"><span>${escapeHtml(currentTest.title)}</span><span class="q-counter">السؤال ${toArabicIndic(currentQIndex+1)} / ${toArabicIndic(currentTest.questions.length)}</span></div><div class="q-text">${q.text}</div><div class="options">${optsHtml}</div><div class="nav-btns"><button id="prevQ" class="secondary" ${currentQIndex===0 ? 'disabled' : ''}>السابق</button><button id="nextQ">${currentQIndex === currentTest.questions.length-1 ? 'إنهاء' : 'التالي'}</button></div></div>`;
    document.body.appendChild(modalDiv); currentModalDiv = modalDiv;
    if(!timerInterval) startTimer(); else updateTimerDisplay();
    currentModalDiv.querySelectorAll('.opt').forEach(opt => {
      opt.addEventListener('click', () => {
        if(!testActive) return;
        const idx = parseInt(opt.dataset.optidx);
        if (currentAnswers[currentQIndex] !== idx) { currentAnswers[currentQIndex] = idx; updateCurrentQuestion(); }
      });
    });
    currentModalDiv.querySelector('#prevQ')?.addEventListener('click', () => { if(testActive && currentQIndex>0){ currentQIndex--; updateCurrentQuestion(); } });
    currentModalDiv.querySelector('#nextQ')?.addEventListener('click', () => {
      if(!testActive) return;
      if (currentAnswers[currentQIndex] === null) { showCustomMessage("تنبيه", "الرجاء اختيار إجابة قبل المتابعة."); return; }
      if (currentQIndex === currentTest.questions.length-1) finishTest();
      else { currentQIndex++; updateCurrentQuestion(); }
    });
  }
  function startTest(testObj) {
    if (!testObj.questions || testObj.questions.length === 0) { showCustomMessage("خطأ", "هذا الاختبار لا يحتوي على أسئلة كافية."); return; }
    const completed = isTestCompleted(testObj.id);
    const allDone = isAllTestsCompleted();
    if(completed && !allDone) { showCustomMessage("⚠️ الاختبار مقفل", "لا يمكن إعادته إلا بعد الانتهاء من جميع الاختبارات الستة."); return; }
    currentTest = testObj;
    currentAnswers = new Array(testObj.questions.length).fill(null);
    currentQIndex = 0;
    timeLeftSeconds = 25*60;
    testActive = true;
    if(testObj.subject === 'reading' && testObj.storyText) {
      const story = testObj.storyText;
      const modalDiv = document.createElement('div'); modalDiv.className = 'modal-overlay';
      modalDiv.innerHTML = `<div class="modal-box"><h3>📖 النص القرائي: ${escapeHtml(testObj.title)}</h3><div class="story-text">${story.replace(/\n/g, '<br>')}</div><div style="text-align:center"><button id="startQuizBtn" style="background:#2e7d64">📝 ابدأ الأسئلة</button><button id="cancelStoryBtn" class="secondary">إلغاء</button></div></div>`;
      document.body.appendChild(modalDiv);
      document.getElementById('startQuizBtn').onclick = () => { modalDiv.remove(); renderTestQuestion(); };
      document.getElementById('cancelStoryBtn').onclick = () => { modalDiv.remove(); testActive=false; };
    } else { renderTestQuestion(); }
  }
  function editStudentData() {
    const modalDiv = document.createElement('div'); modalDiv.className = 'modal-overlay';
    modalDiv.innerHTML = `<div class="modal-box"><h3>✏️ تعديل بيانات الطالب</h3><div class="input-group"><label>👤 اسم الطالب</label><input type="text" id="editName" value="${escapeHtml(student.name)}"></div><div class="input-group"><label>📚 الصف</label><input type="text" id="editGrade" value="${escapeHtml(student.grade)}"></div><div style="display:flex; gap:12px; margin-top:20px;"><button id="saveEditBtn" style="background:#2e7d64">حفظ</button><button id="cancelEditBtn" class="secondary">إلغاء</button></div></div>`;
    document.body.appendChild(modalDiv);
    document.getElementById('saveEditBtn').onclick = () => {
      const newName = document.getElementById('editName').value.trim();
      const newGrade = document.getElementById('editGrade').value.trim();
      if(newName) student.name = newName;
      if(newGrade) student.grade = newGrade;
      saveStudent(); updateBadge(); modalDiv.remove(); renderHome();
    };
    document.getElementById('cancelEditBtn').onclick = () => modalDiv.remove();
  }
  function showReportsWithChart() {
    const myReports = reports.filter(r => r.studentName === student.name);
    if (!myReports.length) { showCustomMessage("التقارير", "لا توجد تقارير بعد. قم بحل اختبار أولاً."); return; }
    const mathReports = myReports.filter(r => r.subject === 'math');
    const readingReports = myReports.filter(r => r.subject === 'reading');
    const mathAvg = mathReports.length ? (mathReports.reduce((a,b)=>a+b.bestScore,0)/mathReports.length).toFixed(1) : 0;
    const readAvg = readingReports.length ? (readingReports.reduce((a,b)=>a+b.bestScore,0)/readingReports.length).toFixed(1) : 0;
    const totalAvg = (parseFloat(mathAvg) + parseFloat(readAvg)) / 2;
    const mathPercentage = (mathAvg / 15) * 100;
    const readPercentage = (readAvg / 15) * 100;
    let detailedHtml = `<div class="detailed-reports"><h4>📋 تفاصيل الاختبارات:</h4>`;
    myReports.forEach(rep => {
      const best = rep.bestScore, total = rep.bestTotal;
      const minutes = Math.floor(rep.bestTime/60), seconds = rep.bestTime%60;
      detailedHtml += `<div class="report-item"><strong>${escapeHtml(rep.testTitle)}</strong><span>⭐ ${toArabicIndic(best)}/${toArabicIndic(total)}</span><span>⏱️ ${toArabicIndic(minutes)}:${toArabicIndic(seconds.toString().padStart(2,'0'))}</span><span>📅 ${rep.attempts[rep.attempts.length-1].date}</span></div>`;
    });
    detailedHtml += `</div>`;
    const modalDiv = document.createElement('div'); modalDiv.className = 'modal-overlay';
    modalDiv.innerHTML = `<div class="modal-box"><h3 style="text-align:center">📊 تقارير الطالب: ${escapeHtml(student.name)} (${escapeHtml(student.grade)})</h3><div class="flex-row"><div class="report-card"><h4>🧮 الرياضيات</h4><p>عدد الاختبارات: ${toArabicIndic(mathReports.length)}</p><p>المتوسط: ${toArabicIndic(mathAvg)} / 15</p><p>النسبة: ${toArabicIndic(mathPercentage.toFixed(1))}%</p><a href="https://wa.me/+966540437287?text=${encodeURIComponent(`طالب: ${student.name}, متوسط الرياضيات: ${mathAvg}/15`)}" target="_blank" class="whatsapp-icon">📱 معلم الرياضيات</a></div><div class="report-card"><h4>📖 القراءة</h4><p>عدد الاختبارات: ${toArabicIndic(readingReports.length)}</p><p>المتوسط: ${toArabicIndic(readAvg)} / 15</p><p>النسبة: ${toArabicIndic(readPercentage.toFixed(1))}%</p><a href="https://wa.me/+966540312932?text=${encodeURIComponent(`طالب: ${student.name}, متوسط القراءة: ${readAvg}/15`)}" target="_blank" class="whatsapp-icon">📱 معلم لغتي</a></div></div><div class="chart-container"><canvas id="perfChart"></canvas></div><div style="text-align:center; margin:16px 0; background:#eef2fa; padding:12px; border-radius:28px"><strong>📈 الإجمالي: ${toArabicIndic(totalAvg.toFixed(1))} / 15 (${toArabicIndic(((totalAvg/15)*100).toFixed(1))}%)</strong></div>${detailedHtml}<button id="closeReport" class="secondary" style="width:100%">إغلاق</button></div>`;
    document.body.appendChild(modalDiv);
    setTimeout(() => {
      const ctx = document.getElementById('perfChart')?.getContext('2d');
      if(ctx) new Chart(ctx, { type: 'bar', data: { labels: ['الرياضيات', 'القراءة'], datasets: [{ label: 'متوسط الدرجة', data: [parseFloat(mathAvg), parseFloat(readAvg)], backgroundColor: ['#1E88E5', '#F9A825'], borderRadius: 12 }] }, options: { responsive: true, scales: { y: { beginAtZero: true, max: 15, ticks: { callback: (v) => toArabicIndic(v) } } } } });
    }, 100);
    modalDiv.querySelector('#closeReport').onclick = () => modalDiv.remove();
  }

  // الصفحة الرئيسية - مع نموذج تسجيل محسن جداً
  function renderHome() {
    const container = document.getElementById('dynamicContent');
    // إذا لم يتم تسجيل الدخول (الاسم فارغ أو الصف فارغ)
    if (!student.name || !student.name.trim() || !student.grade || !student.grade.trim()) {
      container.innerHTML = `
        <div class="register-prompt">
          <h2>✨ مرحباً بك في منصة نافس المحاكية ✨</h2>
          <p style="margin-bottom: 20px; font-size: 1.1rem;">يرجى إدخال بيانات الطالب لبدء الاختبار المحاكي </p>
          <div class="input-group">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">👤 اسم الطالب (ثلاثي)</label>
            <input type="text" id="regName" placeholder="مثال: ....." style="width: 100%;">
          </div>
          <div class="input-group">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">📚 الصف الدراسي</label>
            <input type="text" id="regGrade" placeholder="مثال: الثالث الابتدائي" style="width: 100%;">
          </div>
          <button id="doRegisterBtn">🚀 بدء الاختبارات</button>
        </div>
      `;
      document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
        const name = document.getElementById('regName').value.trim();
        const grade = document.getElementById('regGrade').value.trim();
        if (!name) { showCustomMessage("تنبيه", "الرجاء إدخال اسم الطالب."); return; }
        if (!grade) { showCustomMessage("تنبيه", "الرجاء إدخال الصف."); return; }
        const confirmModal = document.createElement('div'); confirmModal.className = 'modal-overlay';
        confirmModal.innerHTML = `<div class="modal-box" style="text-align:center"><h3>📢 توجيه هام</h3><p style="margin:16px 0">يُرجى من ولي الأمر التأكد من أن الطالب يؤدي الاختبار بنفسه دون مساعدة.<br>الاختبار يقيس المهارات الحقيقية.</p><div style="display:flex; gap:12px; justify-content:center"><button id="confirmOk" style="background:#2e7d64">أوافق وأبدأ</button><button id="confirmCancel" class="secondary">إلغاء</button></div></div>`;
        document.body.appendChild(confirmModal);
        document.getElementById('confirmOk').onclick = () => { student.name = name; student.grade = grade; saveStudent(); updateBadge(); confirmModal.remove(); renderHome(); };
        document.getElementById('confirmCancel').onclick = () => confirmModal.remove();
      });
      return;
    }
    // بعد التسجيل: عرض الاختبارات
    const allCompleted = isAllTestsCompleted();
    let testsHtml = `<h3>📋 اختبارات نافس المحاكية المتاحة</h3><div class="tests-grid">`;
    allTests.forEach((test, idx) => {
      const best = getBestAttempt(test.id);
      const completed = !!best;
      const disabled = completed && !allCompleted;
      const cardClass = test.subject === 'math' ? `math-${idx%3+1}` : `reading-${idx%3+1}`;
      let content = '';
      if (disabled) {
        content = `<div class="lock-icon-large">🔒</div><div class="test-title">${escapeHtml(test.title)}</div><div class="subject-badge">${test.subject === 'math' ? 'رياضيات' : 'قراءة'}</div>`;
      } else {
        let scoreHtml = '';
        if (completed) scoreHtml = `<div class="test-score">⭐ ${best.score}/${best.total}</div>`;
        content = `<div class="test-icon">${test.subject === 'math' ? '📐' : '📖'}</div><div class="test-title">${escapeHtml(test.title)}</div><div class="subject-badge">${test.subject === 'math' ? 'رياضيات' : 'قراءة'}</div>${scoreHtml}`;
      }
      testsHtml += `<div class="test-card ${cardClass} ${disabled ? 'disabled' : ''} ${completed ? 'completed' : ''}" data-testid="${test.id}">${content}</div>`;
    });
    testsHtml += `</div><button class="reports-btn" id="showReportsBtn">📊 تقاريري وتحليلاتي</button>`;
    container.innerHTML = testsHtml;
    document.querySelectorAll('.test-card:not(.disabled)').forEach(card => {
      card.addEventListener('click', () => { const t = allTests.find(tc => tc.id === card.dataset.testid); if(t) startTest(t); });
    });
    document.getElementById('showReportsBtn')?.addEventListener('click', showReportsWithChart);
    document.getElementById('studentBadge')?.addEventListener('click', editStudentData);
  }

  loadData();
  renderHome();
</script>
</body>
</html>
